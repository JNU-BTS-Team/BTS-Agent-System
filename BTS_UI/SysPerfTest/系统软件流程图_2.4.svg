<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1500" viewBox="0 0 900 1500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000" />
    </marker>
    <style>
      .bg { fill:#ffffff; }
      .box { fill:#ffffff; stroke:#000000; stroke-width:2; rx:10; ry:10; }
      .term { fill:#ffffff; stroke:#000000; stroke-width:2; rx:30; ry:30; }
      .diamond { fill:#ffffff; stroke:#000000; stroke-width:2; }
      .title { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:20px; fill:#000000; font-weight:700; }
      .text { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:16px; fill:#000000; }
      .small { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:14px; fill:#000000; }
      .line { stroke:#000000; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="1500"/>
  <text x="450" y="55" text-anchor="middle" class="title">图 2.2 系统软件流程图（2.4）</text>

  <rect class="term" x="60" y="90" width="320" height="70"/>
  <text x="220" y="135" text-anchor="middle" class="title">开始</text>

  <rect class="box" x="60" y="200" width="320" height="80"/>
  <text x="220" y="250" text-anchor="middle" class="title">初始化</text>

  <rect class="box" x="60" y="320" width="320" height="90"/>
  <text x="220" y="365" text-anchor="middle" class="title">账号登录</text>
  <text x="220" y="395" text-anchor="middle" class="small">权限校验 / 进入系统</text>

  <rect class="box" x="60" y="450" width="320" height="90"/>
  <text x="220" y="495" text-anchor="middle" class="title">选择患者</text>
  <text x="220" y="525" text-anchor="middle" class="small">进入病人中心 / 诊断记录</text>

  <rect class="box" x="60" y="580" width="320" height="90"/>
  <text x="220" y="625" text-anchor="middle" class="title">上传 NII 影像</text>
  <text x="220" y="655" text-anchor="middle" class="small">NII / NII.GZ</text>

  <rect class="box" x="60" y="710" width="320" height="90"/>
  <text x="220" y="755" text-anchor="middle" class="title">生成影像预览</text>
  <text x="220" y="785" text-anchor="middle" class="small">切片预览 + 3D 视图</text>

  <rect class="box" x="60" y="840" width="320" height="90"/>
  <text x="220" y="885" text-anchor="middle" class="title">A/B 视图展示</text>
  <text x="220" y="915" text-anchor="middle" class="small">A：原始影像  B：分割上色</text>

  <polygon class="diamond" points="560,670 670,735 560,800 450,735"/>
  <text x="560" y="728" text-anchor="middle" class="text">是否需要生成</text>
  <text x="560" y="752" text-anchor="middle" class="text">分割结果</text>

  <rect class="term" x="690" y="480" width="200" height="70"/>
  <text x="790" y="525" text-anchor="middle" class="title">结束</text>

  <rect class="box" x="690" y="590" width="200" height="140"/>
  <text x="790" y="625" text-anchor="middle" class="title">专家智能分析</text>
  <text x="790" y="655" text-anchor="middle" class="small">依据：患者信息/诊断记录</text>
  <text x="790" y="676" text-anchor="middle" class="small">依据：NII影像预览/3D视图</text>
  <text x="790" y="697" text-anchor="middle" class="small">依据：分割结果(seg_pred)</text>
  <text x="790" y="718" text-anchor="middle" class="small">依据：Debate过程</text>

  <rect class="box" x="690" y="750" width="200" height="80"/>
  <text x="790" y="782" text-anchor="middle" class="title">B 视图展示</text>
  <text x="790" y="808" text-anchor="middle" class="title">分割上色结果</text>

  <rect class="box" x="690" y="840" width="200" height="110"/>
  <text x="790" y="872" text-anchor="middle" class="title">触发远程</text>
  <text x="790" y="898" text-anchor="middle" class="title">分割推理</text>
  <text x="790" y="922" text-anchor="middle" class="small">SSH 运行模型 / 生成 seg_pred</text>
  <text x="790" y="944" text-anchor="middle" class="small">回传并保存到本地</text>

  <path class="line" d="M220 160 L220 200"/>
  <path class="line" d="M220 280 L220 320"/>
  <path class="line" d="M220 410 L220 450"/>
  <path class="line" d="M220 540 L220 580"/>
  <path class="line" d="M220 670 L220 710"/>
  <path class="line" d="M220 800 L220 840"/>

  <path class="line" d="M380 885 L430 885 L430 735 L450 735"/>

  <path class="line" d="M670 735 L680 735 L680 790 L690 790"/>
  <text x="675" y="725" class="small">否</text>

  <path class="line" d="M560 800 L560 895 L690 895"/>
  <text x="575" y="890" class="small">是</text>

  <path class="line" d="M790 840 L790 830"/>
  <path class="line" d="M790 750 L790 730"/>
  <path class="line" d="M790 590 L790 550"/>
</svg>
