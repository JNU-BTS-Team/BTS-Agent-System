<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000" />
    </marker>
    <style>
      .bg { fill:#ffffff; }
      .box { fill:#ffffff; stroke:#000000; stroke-width:2; rx:10; ry:10; }
      .title { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:18px; fill:#000000; font-weight:700; }
      .text { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:14px; fill:#000000; }
      .small { font-family:"Microsoft YaHei","SimSun",Arial,sans-serif; font-size:12px; fill:#000000; }
      .line { stroke:#000000; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text x="600" y="52" text-anchor="middle" class="title">系统结构图（两行蛇形布局）</text>

  <!-- Row 1 (left -> right) -->
  <rect class="box" x="60" y="90" width="240" height="90"/>
  <text x="180" y="125" text-anchor="middle" class="title">用户终端</text>
  <text x="180" y="155" text-anchor="middle" class="text">浏览器 / 医生工作站</text>

  <rect class="box" x="340" y="90" width="240" height="90"/>
  <text x="460" y="125" text-anchor="middle" class="title">Web应用服务</text>
  <text x="460" y="155" text-anchor="middle" class="text">BTS_UI（Flask）</text>

  <rect class="box" x="620" y="90" width="240" height="90"/>
  <text x="740" y="125" text-anchor="middle" class="title">数据库服务</text>
  <text x="740" y="155" text-anchor="middle" class="text">MySQL</text>

  <rect class="box" x="900" y="90" width="240" height="90"/>
  <text x="1020" y="125" text-anchor="middle" class="title">本地文件存储</text>
  <text x="1020" y="155" text-anchor="middle" class="text">Uploads / Static</text>

  <!-- Row 2 (right -> left) -->
  <rect class="box" x="900" y="320" width="240" height="100"/>
  <text x="1020" y="350" text-anchor="middle" class="title">远程分割计算服务</text>
  <text x="1020" y="378" text-anchor="middle" class="text">MMCFormer 推理</text>
  <text x="1020" y="402" text-anchor="middle" class="small">SSH 触发 · SFTP 回传</text>

  <rect class="box" x="620" y="320" width="240" height="100"/>
  <text x="740" y="350" text-anchor="middle" class="title">远程结果目录</text>
  <text x="740" y="378" text-anchor="middle" class="text">Downloads_SegGraph</text>
  <text x="740" y="402" text-anchor="middle" class="small">seg_gt / seg_pred</text>

  <rect class="box" x="340" y="320" width="240" height="110"/>
  <text x="460" y="350" text-anchor="middle" class="title">智能分析服务</text>
  <text x="460" y="378" text-anchor="middle" class="text">多智能体 / 大模型 API</text>
  <text x="460" y="402" text-anchor="middle" class="small">生成：诊断/建议/Debate</text>
  <text x="460" y="422" text-anchor="middle" class="small">结果回传并落库</text>

  <rect class="box" x="60" y="320" width="240" height="100"/>
  <text x="180" y="350" text-anchor="middle" class="title">结果汇总展示</text>
  <text x="180" y="378" text-anchor="middle" class="text">Web服务回传</text>
  <text x="180" y="402" text-anchor="middle" class="small">页面展示/接口返回</text>

  <!-- arrows row 1 -->
  <path class="line" d="M300 135 L340 135"/>
  <text x="320" y="80" class="small">HTTP/HTTPS</text>

  <path class="line" d="M580 135 L620 135"/>
  <text x="600" y="80" class="small">读写</text>

  <path class="line" d="M860 135 L900 135"/>
  <text x="880" y="80" class="small">上传/读取</text>

  <!-- snake turn down -->
  <path class="line" d="M1020 180 L1020 320"/>
  <text x="1035" y="255" class="small">SSH 触发任务</text>

  <!-- arrows row 2 (right -> left) -->
  <path class="line" d="M900 370 L860 370"/>
  <text x="880" y="305" class="small">写入结果</text>

  <path class="line" d="M620 370 L580 370"/>
  <text x="600" y="305" class="small">SFTP下载</text>

  <path class="line" d="M340 370 L300 370"/>
  <text x="320" y="305" class="small">请求/返回</text>
</svg>
