<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肿瘤病例管理系统 - 临床信息</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('main_interface') }}" class="navbar-brand">肿瘤病例管理系统</a>
        <ul class="navbar-nav">
            <li><a href="{{ url_for('main_interface') }}">主界面</a></li>
            <li><a href="{{ url_for('patients') }}">病人管理</a></li>
            {% if current_user.role == 'admin' %}
                <li><a href="{{ url_for('doctors') }}">医生管理</a></li>
            {% endif %}
            <li><a href="{{ url_for('logout') }}">退出登录</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="management-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1>临床信息 - {{ patient.name }}</h1>
                <a href="{{ url_for('diagnoses', patient_id=patient.id) }}" class="btn btn-secondary">返回诊断记录</a>
            </div>

            <form method="POST">
                <div class="form-group">
                    <label for="chief_complaint">主诉</label>
                    <textarea id="chief_complaint" name="chief_complaint" rows="2">{{ clinical_info.chief_complaint or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-group">
                    <label for="present_illness">现病史</label>
                    <textarea id="present_illness" name="present_illness" rows="3">{{ clinical_info.present_illness or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-group">
                    <label for="past_medical_history">既往病史</label>
                    <textarea id="past_medical_history" name="past_medical_history" rows="3">{{ clinical_info.past_medical_history or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-group">
                    <label for="family_history">家族史</label>
                    <textarea id="family_history" name="family_history" rows="2">{{ clinical_info.family_history or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-group">
                    <label for="allergy_history">过敏史</label>
                    <textarea id="allergy_history" name="allergy_history" rows="2">{{ clinical_info.allergy_history or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-group">
                    <label>症状</label>
                    <div class="checkbox-group">
                        <label><span>头痛</span><input type="checkbox" name="symptom_headache" {% if clinical_info and clinical_info.headache %}checked{% endif %}></label>
                        <label><span>呕吐</span><input type="checkbox" name="symptom_vomiting" {% if clinical_info and clinical_info.vomiting %}checked{% endif %}></label>
                        <label><span>癫痫/抽搐</span><input type="checkbox" name="symptom_seizure" {% if clinical_info and clinical_info.seizure %}checked{% endif %}></label>
                        <label><span>视力问题</span><input type="checkbox" name="symptom_vision_problem" {% if clinical_info and clinical_info.vision_problem %}checked{% endif %}></label>
                        <label><span>语言障碍</span><input type="checkbox" name="symptom_speech_problem" {% if clinical_info and clinical_info.speech_problem %}checked{% endif %}></label>
                        <label><span>肢体无力</span><input type="checkbox" name="symptom_limb_weakness" {% if clinical_info and clinical_info.limb_weakness %}checked{% endif %}></label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="specific_remarks">其他特殊情况</label>
                    <textarea id="specific_remarks" name="specific_remarks" rows="3">{{ clinical_info.specific_remarks or '' if clinical_info else '' }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">修改信息</button>
                    <a href="{{ url_for('diagnoses', patient_id=patient.id) }}" class="btn btn-danger">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
