<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布待办任务</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
            <a class="navbar-brand" href="{{ url_for('main_interface') }}">肿瘤病理管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main_interface') }}">主界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('patients') }}">病人管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('doctors') }}">医生管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('todos') }}">今日待办</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link">欢迎, {{ current_user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">退出</a>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="content-wrapper">
            <h1 class="mb-4">发布待办任务</h1>

            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_todo') }}">
                        <div class="form-group">
                            <label for="title">任务标题</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="content">任务内容</label>
                            <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="assignee_id">分配给</label>
                            <select class="form-control" id="assignee_id" name="assignee_id" required>
                                <option value="">请选择医生</option>
                                {% for doctor in doctors %}
                                    <option value="{{ doctor.id }}">{{ doctor.real_name if doctor.real_name else doctor.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="due_date">截止日期</label>
                            <input type="date" class="form-control" id="due_date" name="due_date" required>
                        </div>
                        
                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-primary">发布任务</button>
                            <a href="{{ url_for('todos') }}" class="btn btn-secondary ml-2">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
