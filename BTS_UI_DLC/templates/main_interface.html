        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');

        :root {
            --tech-primary: #00a8ff;
            --tech-highlight: #00e5ff;
            --tech-bg-dark: #000511; /* 深空黑 */
            --tech-bg-darker: #00030a;
            --tech-text: #ffffff;
        }

        .dlc-top-nav {
            position: fixed;
            right: 22px;
            top: 18px;
            display: flex;
            gap: 10px;
            z-index: 100000;
            pointer-events: auto;
        }
        .dlc-top-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 34px;
            min-width: 82px;
            padding: 0 14px;
            border-radius: 8px;
            text-decoration: none;
            font-family: Orbitron, "Microsoft YaHei", sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(230, 252, 255, 0.95);
            background: rgba(0, 168, 255, 0.18);
            border: 1px solid rgba(0, 229, 255, 0.55);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.12);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
        }
        .dlc-top-nav-btn:hover {
            background: rgba(0, 168, 255, 0.28);
            border-color: rgba(0, 229, 255, 0.85);
        }
        .dlc-top-nav-btn.is-disabled {
            opacity: 0.55;
        }

        /* ================= 优化动效区域 ================= */
        
        /* 中间卡片弧形进度条流动 */
        @keyframes arcSweepFlow {
            0% { filter: drop-shadow(0 0 2px #00e5ff); }
            50% { filter: drop-shadow(0 0 8px #00e5ff) brightness(1.5); }
            100% { filter: drop-shadow(0 0 2px #00e5ff); }
        }
        
        /* 1. 外层圆环 4 个定位圆点呼吸闪烁 */
        @keyframes pointBreathe {
            0% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.6; filter: brightness(0.6); }
            100% { opacity: 1; filter: brightness(1); }
        }
        
        /* 2. 中间进度环扫光动效 */
        @keyframes sweepLight {
            0% { clip-path: polygon(50% 50%, 50% 0%, 50% 0%, 50% 0%); }
            100% { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 50% 0%); }
        }
        
        /* 3. 顶层圆环缓慢旋转 */
        @keyframes slowRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* 4. 白色扇形扫描线 (雷达核心扫描) */
        @keyframes radarSweepCore {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .tech-radar-core-sweep {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-origin: center center;
            background: conic-gradient(from 0deg, rgba(255,255,255,0.8) 0deg, transparent 40deg);
            animation: radarSweepCore 10s linear infinite;
            z-index: 10;
            pointer-events: none;
            filter: blur(2px);
            mix-blend-mode: overlay;
        }

        /* 5. 中心文字动效 */
        @keyframes textBreatheScale {
            0% { text-shadow: 0 0 2px #ffff00; transform: translate(-50%, -50%) scale(1); }
            50% { text-shadow: 0 0 10px #ffff00; transform: translate(-50%, -50%) scale(1.05); }
            100% { text-shadow: 0 0 2px #ffff00; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes statusFloatGlow {
            0%, 100% { transform: translate(-50%, -50%); text-shadow: 0 0 3px #00e5ff; opacity: 1; }
            50% { transform: translate(-50%, calc(-50% - 2px)); text-shadow: 0 0 8px #00e5ff; opacity: 1; }
            95% { opacity: 1; }
            98% { opacity: 0; }
        }

        /* 6. 背景缓慢斜向漂移 */
        @keyframes gridSlowDrift {
            0% { background-position: 0 0; }
            100% { background-position: -20px -20px; }
        }
        .tech-hud-background {
            animation: gridSlowDrift 100s linear infinite !important;
        }

        /* 7. 进度环容器配置 */
        .tech-progress-ring-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 5;
            mask-image: radial-gradient(transparent 65%, black 66%);
            -webkit-mask-image: radial-gradient(transparent 65%, black 66%);
            animation: sweepLight 2s ease-out forwards;
        }
        .tech-progress-ring-fill {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--tech-highlight) 0%, var(--tech-primary) 96%, transparent 96%);
        }
        
        body.figma-home {

        }

        .figma-home-wrapper {
            position: fixed;
            left: 0;

            width: 100vw;
            height: 100vh;
            z-index: 2;
        }

        /* 页面加载动效 - HUD过渡 */
        #hud-loader {
            position: fixed;

        }
        
        .hud-radar-loader {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid var(--tech-highlight);
            position: relative;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
        .hud-radar-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(0, 229, 255, 0.1) 80%, rgba(255, 255, 255, 0.8) 100%);
            animation: scanRadarHUD 2s linear infinite;
        }
        .shatter-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--tech-highlight);
            opacity: 0;
            pointer-events: none;
        }

        /* 元素逐帧淡入 */
        .figma-home-wrapper > div {
            opacity: 0;
            /* 动画由 JS 控制触发 */
        }

        /* 全局底层动效 */
        /* 1. 动态网格背景 */
        body.figma-home::before {
            content: '';
            position: absolute;
            inset: -100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.13) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.13) 1px, transparent 1px);
            background-size: 10px 10px;
            pointer-events: none;
            z-index: 1;
            /* 网格斜向缓慢漂移 0.3px/s (对于大尺寸大约需要很长时间) */
            animation: gridDrift 100s linear infinite;
        }

        /* 2. CRT 扫描线 */
        .crt-scanline {
            position: absolute;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 168, 255, 0.08) 51%);
            background-size: 100% 4px;
        }
        
        .global-scanline {
            position: absolute;
            left: 0;
            top: -5px;
            width: 100%;
            height: 1px;
            background: rgba(0, 168, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 168, 255, 0.5);
            z-index: 998;
            pointer-events: none;
            animation: globalScan 15s linear infinite; /* 周期15s */
        }

        /* 电子干扰波纹 */
        body.figma-home::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 998;
            pointer-events: none;
            background: rgba(0, 229, 255, 0.02);
            opacity: 0;
            animation: glitchEffect 8s infinite;
        }

        /* 3. 菲涅尔边缘发光 */
        .fresnel-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 997;
            background: radial-gradient(circle at center, transparent 60%, rgba(0, 229, 255, 0.15) 100%);
        }

        /* 文本字符偏移阴影 */
        .tech-text-glow {
            text-shadow: 0 0 2px var(--tech-highlight), 0 0 5px rgba(0, 168, 255, 0.3) !important;
            font-family: 'Orbitron', 'Consolas', monospace; /* 替换字体 */
        }

        .figma-home-wrapper > div > div {
            z-index: 10;
        }
        
        /* 面板/边框极致细节 (军用战术面板) */
        .tech-panel-border {
            position: absolute;
            inset: 0;
            border-radius: 0px; 
            pointer-events: none;
            z-index: 0; 
            /* 背景：半透磨砂 + 电路纹理 */
            background: rgba(0, 20, 50, 0.8);
            backdrop-filter: blur(4px);
            /* 双层发光阴影 */
            box-shadow: 0 0 8px #00e5ff, 3px 3px 12px #000;
            overflow: hidden;
        }
        /* 横向拉丝纹理 + 微型电路板纹路 (用渐变模拟) */
        .tech-panel-border::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 168, 255, 0.06) 2px, rgba(0, 168, 255, 0.06) 3px),
                radial-gradient(circle at 10% 10%, rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 90% 90%, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            pointer-events: none;
            z-index: 1;
        }

        /* 分段式流光边框 (8段点亮) */
        .tech-panel-border-scan {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }
        .tech-panel-border-scan::before {
            content: '';
            position: absolute;
            inset: 0;
            /* 使用带透明度的虚线边框模拟8段，外加扫光蒙版 */
            border: 1px dashed rgba(0, 229, 255, 0.2);
            border-width: 2px;
            border-image: repeating-linear-gradient(45deg, var(--tech-highlight) 0, var(--tech-highlight) 10px, transparent 10px, transparent 20px) 1;
            -webkit-mask: conic-gradient(from var(--border-angle, 0deg), transparent 70%, white 100%);
            mask: conic-gradient(from var(--border-angle, 0deg), transparent 70%, white 100%);
            animation: borderScanConic 8s linear infinite;
        }

        @property --border-angle {
            syntax: '<angle>';
            inherits: true;
            initial-value: 0deg;
        }
        @keyframes borderScanConic {
            to { --border-angle: 360deg; }
        }

        /* 直角金属铆钉 (每角1个，中心白光，脉冲闪烁) */
        .tech-panel-rivet {
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid var(--tech-highlight);
            background: rgba(0, 20, 50, 0.8);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rivetPulseNew 2s infinite;
        }
        .tech-panel-rivet::after {
            content: '';
            width: 1px;
            height: 1px;
            background: #fff;
            box-shadow: 0 0 2px #fff;
        }
        .rivet-tl { top: 0; left: 0; }
        .rivet-tr { top: 0; right: 0; }
        .rivet-bl { bottom: 0; left: 0; }
        .rivet-br { bottom: 0; right: 0; }

        /* 中心全息 HUD 环特效重构 */
        .tech-core-panel {
            overflow: visible !important;
            position: relative;
            z-index: 15; 
        }
        .tech-hud-ring-1, .tech-hud-ring-2, .tech-hud-ring-3, .tech-hud-radar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
        }
        /* 96% 核心圆环雷达扫描线 */
        .tech-hud-radar-line {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 120px;
            height: 120px;
            transform-origin: 0 0;
            background: conic-gradient(from 0deg, rgba(255,255,255,0.8) 0deg, transparent 10deg);
            animation: scanRadarLine 10s linear infinite;
            z-index: 9;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 100% 0 0;
        }

        /* 侧边圆形仪表盘特效 (3层动效) */
        .tech-side-ring-base {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            border-radius: 50%;
            border: 4px solid rgba(0, 168, 255, 0.2); /* 底层：静态暗环 */
            pointer-events: none;
            z-index: 1;
        }
        .tech-side-ring-sweep {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--tech-highlight); /* 中层：动态扫光环 */
            animation: sweepRingNew 2s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
            z-index: 2;
        }
        /* 扫光时的粒子喷发用伪元素模拟 */
        .tech-side-ring-sweep::after {
            content: '';
            position: absolute;
            top: -4px; left: 50%;
            width: 4px; height: 4px;
            background: #fff;
            box-shadow: 0 0 5px var(--tech-highlight), 0 0 10px var(--tech-highlight);
            border-radius: 50%;
        }
        .tech-side-ring-top {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            border: 1px solid var(--tech-highlight); /* 顶层：高亮旋转环 */
            filter: blur(1px); /* 边缘高斯模糊 */
            animation: rotateOuterCentered 1.25s linear infinite; /* 0.8r/s */
            z-index: 3;
            border-left-color: transparent;
            border-right-color: transparent;
        }
        
        /* 数字跳动 + 呼吸发光 */
        .tech-number-jump {
            font-family: 'Orbitron', 'Consolas', monospace !important;
            animation: numberBreathe 2s ease-in-out infinite alternate;
        }

        /* 柱状图动效 */
        .tech-main-bar {
            position: relative;
            transform-origin: bottom;
            animation: barGrow 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            background: linear-gradient(to right, rgba(0, 229, 255, 0.53), rgba(0, 229, 255, 0.13)) !important; /* 纵向渐变高光 */
            transition: all 0.3s;
        }
        .tech-main-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ffffff; /* 柱顶高光点 */
            box-shadow: 0 0 2px #fff;
            transition: all 0.3s ease;
        }
        .tech-main-bar:hover {
            filter: brightness(1.5);
        }
        .tech-main-bar:hover::after {
            height: 5px;
            box-shadow: 0 0 10px var(--tech-highlight);
            border-radius: 50%;
            background: var(--tech-highlight);
            top: -2px;
        }

        /* 坐标轴网格线微动 */
        .tech-grid-line {
            position: absolute;
            width: 100%;
            height: 1px;
            border-top: 1px dashed rgba(0, 168, 255, 0.27);
            animation: gridLineFloat 5s ease-in-out infinite alternate;
        }
        .tech-grid-line::before, .tech-grid-line::after {
            content: '';
            position: absolute;
            top: -1px;
            width: 2px; height: 2px;
            background: var(--tech-highlight);
            border-radius: 50%;
            box-shadow: 0 0 4px var(--tech-highlight);
        }
        .tech-grid-line::before { left: 0; }
        .tech-grid-line::after { right: 0; }

        /* 折线图动效 */
        .tech-line-chart path {
            stroke: var(--tech-highlight);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2s ease-out forwards, lineGlow 2s 2s infinite alternate;
        }
        .tech-line-point {
            fill: var(--tech-bg-dark);
            stroke: var(--tech-highlight);
            stroke-width: 2;
            transform-origin: center;
            animation: pointPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        .tech-line-point-pulse {
            animation: pointPulseNew 1.5s infinite;
        }

        /* 卡片与按钮交互 */
        .interactive-element {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 10; 
            cursor: pointer;
        }
        .interactive-element:hover,
        .todo-runtime-card:hover,
        .figma-home-wrapper [data-layer^="btn__"]:hover,
        .figma-home-wrapper [data-layer="team-overview-btn"]:hover {
            transform: translateY(-2px);
            background-color: rgba(0, 229, 255, 0.13) !important;
            /* 边框流光加速在JS中控制或通过覆盖动画 */
        }
        .interactive-element:active,
        .todo-runtime-card:active {
            transform: scale(0.98);
        }

        /* 任务列表状态竖线 */
        .task-status-line {
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 3px;
            border-radius: 2px;
            animation: statusBreathe 3s infinite alternate;
        }
        .status-green { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .status-yellow { background: #ffff00; box-shadow: 0 0 5px #ffff00; }
        .status-red { background: #ff0000; box-shadow: 0 0 5px #ff0000; }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
            z-index: 9999;
        }

        /* 动画关键帧 */
        @keyframes gridDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -100px); }
        }
        @keyframes globalScan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
        @keyframes glitchEffect {
            0%, 95%, 100% { opacity: 0; transform: translateX(0); }
            96% { opacity: 1; transform: translateX(-2px); filter: contrast(1.5); }
            97% { opacity: 1; transform: translateX(2px); filter: contrast(0.8); }
            98% { opacity: 1; transform: translateX(-1px); }
        }
        @keyframes rivetPulseNew {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.8; filter: brightness(0.8); }
        }
        @keyframes sweepRingNew {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes numberBreathe {
            0% { text-shadow: 0 0 2px var(--tech-highlight); }
            100% { text-shadow: 0 0 5px var(--tech-highlight); }
        }
        @keyframes gridLineFloat {
            0% { transform: translateY(-0.5px); }
            100% { transform: translateY(0.5px); }
        }
        @keyframes lineGlow {
            0% { filter: drop-shadow(0 0 2px var(--tech-highlight)); }
            100% { filter: drop-shadow(0 0 6px var(--tech-highlight)); }
        }
        @keyframes pointPulseNew {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); border-width: 2px; }
            100% { box-shadow: 0 0 0 3px rgba(0, 229, 255, 0); border-width: 4px; }
        }
        @keyframes statusBreathe {
            0% { filter: brightness(0.5); }
            100% { filter: brightness(1); }
        }
        @keyframes scanRadarLine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInLayout {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes rotateOuterCentered { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes scanRadarHUD { 100% { transform: rotate(360deg); } }
        @keyframes barGrow { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
    </style>
</head>

    <script id="main-data" type="application/json">{{ {
        "dashboard_overview": (dashboard_overview or {}),
        "module_cards": (module_cards or []),
        "task_publish_data": (task_publish_data or {}),
        "warning_overview": (warning_overview or {}),
        "bar_values": (bar_values or [])
    } | tojson }}</script>
    <script>
        const applyFigmaScale = () => {
            const wrapper = document.querySelector('.figma-home-wrapper');
            if (!wrapper) return;
            const root = wrapper.querySelector('div[data-layer]') || wrapper.firstElementChild;
            if (!root) return;
            const w = parseFloat(root.style.width || '') || root.getBoundingClientRect().width || 1920;
            const h = parseFloat(root.style.height || '') || root.getBoundingClientRect().height || 1080;
            const vv = window.visualViewport;
            const vw = (vv && vv.width) ? vv.width : (wrapper.clientWidth || window.innerWidth || 0);
            const vh = (vv && vv.height) ? vv.height : (wrapper.clientHeight || window.innerHeight || 0);
            const vx = (vv && typeof vv.offsetLeft === 'number') ? vv.offsetLeft : 0;
            const vy = (vv && typeof vv.offsetTop === 'number') ? vv.offsetTop : 0;
            if (!vw || !vh || !w || !h) return;
            const scale = Math.min(vw / w, vh / h, 1);
            const scaledW = w * scale;
            const scaledH = h * scale;
            root.style.position = 'absolute';
            root.style.left = `0px`;
            root.style.top = `0px`;
            root.style.transformOrigin = 'top left';
            const tx = Math.max(0, (vw - scaledW) / 2);
            const ty = Math.max(0, (vh - scaledH) / 2);
            const zoomSupported = typeof CSS !== 'undefined' && CSS.supports && CSS.supports('zoom', '1');
            if (zoomSupported) {
                root.style.zoom = `${scale}`;
                root.style.transform = `translate(${vx + tx}px, ${vy + ty}px)`;
            } else {
                root.style.zoom = '';
                root.style.transform = `translate(${vx + tx}px, ${vy + ty}px) scale(${scale})`;
            }
        };

        window.addEventListener('resize', applyFigmaScale);
        // 页面加载动效控制
        window.addEventListener('load', () => {
            applyFigmaScale();
            setTimeout(applyFigmaScale, 60);
            setTimeout(applyFigmaScale, 260);
            setTimeout(applyFigmaScale, 1200);
            setTimeout(() => {
                const loader = document.getElementById('hud-loader');
                if (loader) {
                    // 生成碎裂粒子
                    for (let i = 0; i < 20; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'shatter-particle';
                        particle.style.left = '50%';
                        particle.style.top = '50%';
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 100 + 50;
                        const tx = Math.cos(angle) * dist;
                        const ty = Math.sin(angle) * dist;
                        particle.animate([
                            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                            { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                        ], { duration: 500, easing: 'ease-out' });
                        loader.appendChild(particle);
                    }
                    const radar = loader.querySelector('.hud-radar-loader');
                    if (radar) radar.style.display = 'none';
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.remove();
                            // 开始元素逐帧淡入
                            const children = Array.from(document.querySelector('.figma-home-wrapper').children);
                            children.forEach((child, index) => {
                                child.style.opacity = '0';
                                child.style.animation = `fadeInLayout 0.5s ease forwards ${index * 0.05}s`;
                            });
                        }, 300);
                    }, 100);
                }
            }, 800); // 假装加载一段时间
        });

        // 全局波纹效果
        document.addEventListener('click', function (e) {
            const isClickable = e.target.closest('.interactive-element, .todo-runtime-card, [data-layer^="btn__"], [data-layer="list"], button');
            if (isClickable) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                const rect = isClickable.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
                isClickable.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });

        const mainDataEl = document.getElementById('main-data');
        let mainData = {};
        if (mainDataEl) {
            try {
                mainData = JSON.parse(mainDataEl.textContent);
            } catch (err) {
                mainData = {};
            }
        }
        const dashboardOverview = mainData.dashboard_overview || {};
        const moduleCards = mainData.module_cards || [];
        const taskPublishData = mainData.task_publish_data || {};
        const warningOverview = mainData.warning_overview || {};
        const visualTaskPublish = taskPublishData.title ? taskPublishData : {
            title: '系统任务概览',

                { container: '会议使用率', value: '96%', label: '完成率' },

            ],
            categories: [

                { label: '诊断录入', value: 286 },
                { label: '影像归档', value: 244 },

                { label: '智能评估', value: 96 },

            ]
        };
        const visualWarningOverview = {

            rings: [
                { container: '待处理', label: '今日接诊', value: '48' },
                { container: '处理率', label: '推理成功率', value: '98%' },
                { container: '历史总数', label: '平均响应', value: '1.6s' }
            ],
            items: [
                { message: '运行状态：今日新增诊断记录 26 条', time: '03.14 09:30' },
                { message: '运行状态：远程推理已完成 41 次', time: '03.14 10:05' },
                { message: '运行状态：影像归档任务完成率 97%', time: '03.14 10:42' }
            ]
        };
        const barValues = mainData.bar_values || [];
        const displayBarValues = [118, 136, 129, 142, 151, 145, 158, 166, 154, 173, 168, 182, 176, 189, 194, 186, 201, 209, 198, 214, 223, 216, 231, 245];
        const displayOverview = {

        if (dateNode && displayOverview.date_label) {

        const introTitleNodes = getLeafDivs(document).filter((node) => node.textContent.trim() === '输入文本').sort((a, b) => readLeftValue(a) - readLeftValue(b));

        const introDescNodes = getLeafDivs(document).filter((node) => node.textContent.includes('输入文本输入文本')).sort((a, b) => readLeftValue(a) - readLeftValue(b));
        if (introDescNodes.length >= 2) {

        const centerPanel = document.querySelector('[data-layer="中"]');

            const centerStatusNode = centerLeafNodes.find((node) => node.textContent.trim() === '系统正常');

                    centerPercentCombinedNode.textContent = `${Math.round(currentVal)}%`;

            } else if (centerPercentNode) {

                // 添加外圈 4 个定位圆点
                const positions = [
                    { top: '-4px', left: 'calc(50% - 4px)' },

                    Object.assign(dot.style, pos);
                    ringOuter.appendChild(dot);
                });
                centerPanel.appendChild(ringOuter);

                const ringInner = document.createElement('div');
                ringInner.className = 'tech-hud-ring-inner';

                const scan = document.createElement('div');

                const radarLine = document.createElement('div');

                const sweepCore = document.createElement('div');
                sweepCore.className = 'tech-radar-core-sweep';
                centerPanel.appendChild(sweepCore);
                
                // 进度环
                const progressRing = document.createElement('div');
                progressRing.className = 'tech-progress-ring-container';
                const progressFill = document.createElement('div');
                progressFill.className = 'tech-progress-ring-fill';
                progressRing.appendChild(progressFill);
                centerPanel.appendChild(progressRing);
            }
        }

        // 提取 topPanel 到 body 以避免被网格遮挡和产生朦胧效果
        const topPanel = document.querySelector('div[data-layer="top"]');
        if (topPanel) {
            document.body.appendChild(topPanel);
            topPanel.style.position = 'absolute';
            topPanel.style.top = '0';
            topPanel.style.left = '50%';
            topPanel.style.transform = 'translateX(-50%)';
            topPanel.style.zIndex = '10000';
            const topTitleNode = Array.from(topPanel.querySelectorAll('div'))
                .find((node) => node.children.length === 0 && /端侧脑.*系统|脑肿瘤.*系统/.test(node.textContent.trim()));
            if (topTitleNode) {

                const leafDivs = Array.from(card.querySelectorAll('div')).filter((el) => el.children.length === 0);
                const setByExact = (source, target) => {
                    const node = leafDivs.find((el) => el.textContent.trim() === source);
                    if (node) {
                        node.textContent = target;
                    }
                    return node || null;
                };
                const getNearestByLabel = (labelText, textPredicate) => {
                    const labelNode = leafDivs.find((el) => el.textContent.trim() === labelText);
                    if (!labelNode) {
                        return null;
                    }
                    const labelRect = labelNode.getBoundingClientRect();
                    const candidates = leafDivs.filter((el) => textPredicate(el.textContent.trim()));
                    if (candidates.length === 0) {
                        return null;
                    }
                    const distance = (rectA, rectB) => {
                        const ax = rectA.left + rectA.width / 2;
                        const ay = rectA.top + rectA.height / 2;
                        const bx = rectB.left + rectB.width / 2;
                        const by = rectB.top + rectB.height / 2;
                        return Math.hypot(ax - bx, ay - by);
                    };
                    return candidates
                        .sort((a, b) => distance(labelRect, a.getBoundingClientRect()) - distance(labelRect, b.getBoundingClientRect()))[0];
                };

                const createInput = (key, element) => {
                    element.dataset.input = key;
                    element.style.height = '30px';
                    element.style.background = 'rgba(2,16,50,0.9)';
                    element.style.border = '1px solid #4b8dde';
                    element.style.color = '#fff';
                    element.style.padding = '0 8px';
                    return element;
                };

                const tabTaskName = createTab('taskName', '任务名');
                const tabDoctor = createTab('doctor', '医生');
                const tabText = createTab('content', '文本');
                const tabDate = createTab('deadline', '日期');
                panel.appendChild(tabTaskName);
                panel.appendChild(tabDoctor);
                panel.appendChild(tabText);
                panel.appendChild(tabDate);

                const inputTaskName = createInput('taskName', document.createElement('input'));
                inputTaskName.placeholder = '输入任务名';
                inputTaskName.style.width = '102px';
                inputTaskName.value = state.draft.taskName;

                const inputDoctor = createInput('doctor', document.createElement('select'));
                inputDoctor.style.width = '95px';
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '医生';
                inputDoctor.appendChild(emptyOption);
                state.doctors.forEach((doctor) => {
                    const option = document.createElement('option');
                    option.value = String(doctor.id);
                    option.textContent = doctor.username;
                    inputDoctor.appendChild(option);
                });
                inputDoctor.value = state.draft.assigneeId ? String(state.draft.assigneeId) : '';

                const inputText = createInput('content', document.createElement('input'));
                inputText.placeholder = '输入任务文本';
                inputText.style.width = '128px';
                inputText.value = state.draft.content;

                const inputDate = createInput('deadline', document.createElement('input'));
                inputDate.type = 'date';
                inputDate.style.width = '90px';
                inputDate.value = state.draft.deadline;
                inputDate.readOnly = false;

                const datePickerBtn = document.createElement('button');
                datePickerBtn.type = 'button';
                datePickerBtn.textContent = '📅';
                datePickerBtn.style.height = '30px';
                datePickerBtn.style.width = '30px';
                datePickerBtn.style.padding = '0';
                datePickerBtn.style.background = '#06355a';
                datePickerBtn.style.border = '1px solid #23fff9';
                datePickerBtn.style.color = '#66ffff';
                datePickerBtn.style.cursor = 'pointer';
                datePickerBtn.style.display = 'none';
                datePickerBtn.addEventListener('click', () => {
                    inputDate.focus();
                    if (typeof inputDate.showPicker === 'function') {
                        inputDate.showPicker();
                    }
                });

                panel.appendChild(inputTaskName);
                panel.appendChild(inputDoctor);
                panel.appendChild(inputText);
                panel.appendChild(inputDate);
                panel.appendChild(datePickerBtn);

                const tabs = [tabTaskName, tabDoctor, tabText, tabDate];
                const inputs = {
                    taskName: inputTaskName,
                    doctor: inputDoctor,
                    content: inputText,
                    deadline: inputDate
                };

                const switchTab = (tabKey) => {
                    state.draft.activeTab = tabKey;
                    Object.entries(inputs).forEach(([key, input]) => {
                        input.style.display = key === tabKey ? 'block' : 'none';
                    });
                    datePickerBtn.style.display = tabKey === 'deadline' ? 'block' : 'none';
                    tabs.forEach((tab) => {
                        tab.style.filter = tab.dataset.tab === tabKey ? 'brightness(1.22)' : '';
                    });
                    inputs[tabKey].focus();
                };

                tabTaskName.addEventListener('click', () => switchTab('taskName'));
                tabDoctor.addEventListener('click', () => switchTab('doctor'));
                tabText.addEventListener('click', () => switchTab('content'));
                tabDate.addEventListener('click', () => switchTab('deadline'));

                inputTaskName.addEventListener('input', () => {
                    state.draft.taskName = inputTaskName.value;
                });
                inputDoctor.addEventListener('change', () => {
                    state.draft.assigneeId = inputDoctor.value;
                });
                inputText.addEventListener('input', () => {
                    state.draft.content = inputText.value;
                });
                inputDate.addEventListener('change', () => {
                    state.draft.deadline = inputDate.value;
                });
                inputText.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' && event.ctrlKey) {
                        publishTodo();
                    }
                });

                switchTab(state.draft.activeTab || 'taskName');
                card.appendChild(overlay);
            };

            const buildCard = (todo, index, isDraft) => {
                const card = cardTemplate.cloneNode(true);
                card.classList.add('todo-runtime-card');
                card.style.position = 'absolute';
                card.style.top = `${baselineTop + cardStep * index}px`;
                card.style.left = '0px';
                card.style.transform = 'scale(1)';
                card.dataset.todoId = isDraft ? '' : String(todo.id);
                card.dataset.isDraft = isDraft ? '1' : '0';
                card.setAttribute('data-layer', isDraft ? 'todo-card-draft' : 'todo-card-item');
                setCardValues(card, {
                    taskName: todo.task_name || '',
                    content: todo.content || '',
                    assignee: todo.assignee_name || '',
                    deadline: todo.deadline || ''
                });
                Array.from(card.querySelectorAll('div')).forEach((node) => {
                    const left = Number.parseFloat(node.style.left || '0');
                    if (!Number.isNaN(left) && left < 0) {
                        node.style.left = '0px';
                    }
                });

                // 任务列表状态竖线
                const statusLine = document.createElement('div');
                statusLine.className = 'task-status-line';
                // 根据索引或日期分配颜色
                const statusColors = ['status-green', 'status-yellow', 'status-red'];
                statusLine.classList.add(statusColors[index % 3]);
                statusLine.style.left = '0px';
                card.appendChild(statusLine);

                if (isDraft) {
                    renderDraftOverlay(card);
                    return card;
                }

                card.addEventListener('mouseenter', () => {
                    if (!state.deleteMode) {
                        return;
                    }
                    const todoId = Number.parseInt(card.dataset.todoId || '0', 10);
                    if (state.selectedTodoId === todoId) {
                        return;
                    }
                    applyCardVisual(card, 'hover');
                });
                card.addEventListener('mouseleave', () => {
                    if (!state.deleteMode) {
                        return;
                    }
                    const todoId = Number.parseInt(card.dataset.todoId || '0', 10);
                    if (state.selectedTodoId === todoId) {
                        applyCardVisual(card, 'selected');
                        return;
                    }
                    applyCardVisual(card, 'normal');
                });
                card.addEventListener('mousedown', () => {
                    if (!state.deleteMode) {
                        return;
                    }
                    applyCardVisual(card, 'pressed');
                });
                card.addEventListener('mouseup', () => {
                    if (!state.deleteMode) {
                        return;
                    }
                    const todoId = Number.parseInt(card.dataset.todoId || '0', 10);
                    if (state.selectedTodoId === todoId) {
                        applyCardVisual(card, 'selected');
                    } else {
                        applyCardVisual(card, 'hover');
                    }
                });
                card.addEventListener('click', async () => {
                    if (!state.deleteMode || state.loading) {
                        return;
                    }
                    const todoId = Number.parseInt(card.dataset.todoId || '0', 10);
                    if (!todoId) {
                        return;
                    }
                    state.selectedTodoId = todoId;
                    updateSelectedVisual();
                    openDeleteConfirm();
                });
                return card;
            };

            const renderCards = () => {
                Array.from(todoScroll.querySelectorAll('.todo-runtime-card')).forEach((card) => card.remove());
                const rows = [];
                if (state.draftOpen) {
                    rows.push({
                        id: null,
                        task_name: state.draft.taskName || '提供样本',
                        content: state.draft.content || '完成现阶段样本提供指标',
                        assignee_name: (() => {
                            const doctor = state.doctors.find((item) => String(item.id) === String(state.draft.assigneeId));
                            return doctor ? doctor.username : 'doctor1';
                        })(),
                        deadline: state.draft.deadline ? state.draft.deadline.slice(2).replace(/-/g, '-') : '26-05-10',
                        is_draft: true
                    });
                }
                rows.push(...state.todos.map((item) => ({ ...item, is_draft: false })));
                rows.forEach((row, index) => {
                    const card = buildCard(row, index, row.is_draft);
                    todoScroll.appendChild(card);
                });
                updateSelectedVisual();
                renderDeleteButtonState();
            };

            const cancelDeleteMode = () => {
                state.deleteMode = false;
                clearCardSelection();
                renderDeleteButtonState();
                renderCards();
            };

            const cancelDraftMode = () => {
                state.draftOpen = false;
                state.draft = { taskName: '', assigneeId: '', content: '', deadline: '', activeTab: 'taskName' };
                renderCards();
            };

            const openDraft = () => {
                state.draftOpen = true;
                state.draft.activeTab = 'taskName';
                state.deleteMode = false;
                state.selectedTodoId = null;
                renderCards();
            };

            const publishTodo = async () => {
                if (!state.draftOpen || state.loading) {
                    return;
                }
                if (!state.draft.taskName.trim() || !state.draft.content.trim() || !state.draft.deadline.trim() || !state.draft.assigneeId) {
                    alert('请先输入任务名、医生、文本和日期后再发布');
                    return;
                }
                state.loading = true;
                try {
                    const created = await apiCreate();
                    state.todos.unshift(created);
                    state.draftOpen = false;
                    state.draft = { taskName: '', assigneeId: '', content: '', deadline: '', activeTab: 'taskName' };
                    state.deleteMode = false;
                    state.selectedTodoId = null;
                    todoScroll.scrollTop = 0;
                    renderCards();
                } catch (err) {
                    alert(err.message || '发布失败');
                } finally {
                    state.loading = false;
                }
            };

            if (newButton) {
                newButton.addEventListener('click', openDraft);
            }

            if (publishButton) {
                publishButton.addEventListener('click', publishTodo);
            }

            if (deleteButton) {
                deleteButton.addEventListener('click', async () => {
                    if (state.deleteMode) {
                        openDeleteConfirm();
                        return;
                    }
                    state.deleteMode = true;
                    state.selectedTodoId = null;
                    state.draftOpen = false;
                    renderCards();
                });
            }

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    if (state.deleteConfirmOpen) {
                        closeDeleteConfirm();
                    } else if (state.deleteMode) {
                        cancelDeleteMode();
                    } else if (state.draftOpen) {
                        cancelDraftMode();
                    }
                } else if (event.key === 'Delete') {
                    if (state.deleteMode) {
                        event.preventDefault();
                        openDeleteConfirm();
                    }
                }
            });

            document.addEventListener('click', (event) => {
                const target = event.target;
                if (!(target instanceof Element)) {
                    return;
                }
                const insideTodoArea = Boolean(target.closest(
                    '[data-layer="todo-panel-mask"],[data-layer="todo-panel-scroll"],[data-layer="todo-btn-new"],[data-layer="todo-btn-publish"],[data-layer="todo-btn-delete"],.todo-runtime-card,[data-layer="todo-card-draft"],[data-layer="todo-delete-confirm-overlay"]'
                ));
                if (!insideTodoArea) {
                    if (state.deleteConfirmOpen) {
                        closeDeleteConfirm();
                    }
                    if (state.deleteMode) {
                        cancelDeleteMode();
                    }
                    if (state.draftOpen) {
                        cancelDraftMode();
                    }
                }
            });

            todoMask.addEventListener('wheel', (event) => {
                todoScroll.scrollTop += event.deltaY;
                event.preventDefault();
            }, { passive: false });

            apiLoad()
                .then(() => {
                    renderCards();
                })
                .catch((err) => {
                    alert(err.message || '加载待办失败');
                    renderCards();
                });
        }
    </script>
</body>
</html>
