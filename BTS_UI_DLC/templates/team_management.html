<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队管理 - 主屏</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');

        :root {
            --tech-primary: #00a8ff;
            --tech-highlight: #00e5ff;
            --tech-bg-dark: #000a1a; /* 深空黑 */
            --tech-bg-darker: #00030a;
            --tech-text: #ffffff;
        }

        body.figma-home {
            background: var(--tech-bg-dark);
            overflow: hidden;
            position: relative;
        }

        .dlc-top-border {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(270deg, rgba(18, 142, 232, 0.38) 0%, #3662A4 100%);
            z-index: 99998;
            pointer-events: none;
        }
        .dlc-top-border::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            opacity: 0.50;
            background: linear-gradient(90deg, rgba(54, 98, 164, 1) 0%, rgba(18, 142, 232, 0) 100%);
        }

        .dlc-top-nav {
            position: fixed;
            right: 22px;
            top: 18px;
            display: flex;
            gap: 10px;
            z-index: 100000;
            pointer-events: auto;
        }
        .dlc-top-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 34px;
            min-width: 82px;
            padding: 0 14px;
            border-radius: 8px;
            text-decoration: none;
            font-family: Orbitron, "Microsoft YaHei", sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(230, 252, 255, 0.95);
            background: rgba(0, 168, 255, 0.18);
            border: 1px solid rgba(0, 229, 255, 0.55);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.12);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
        }
        .dlc-top-nav-btn:hover {
            background: rgba(0, 168, 255, 0.28);
            border-color: rgba(0, 229, 255, 0.85);
        }
        .dlc-top-nav-btn.is-disabled {
            opacity: 0.55;
        }

        .figma-home-wrapper [data-layer="智慧医生管理平台"] {
            visibility: hidden !important;
        }

        .dlc-page-title {
            position: fixed;
            left: 22px;
            top: 18px;
            z-index: 100001;
            color: white;
            font-size: 46px;
            font-family: "Source Han Sans CN", "Microsoft YaHei", sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.50);
            white-space: nowrap;
            pointer-events: none;
        }

        /* 页面加载动效 - HUD过渡 */
        #hud-loader {
            position: fixed;
            inset: 0;
            background: var(--tech-bg-dark);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        .hud-radar-loader {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid var(--tech-highlight);
            position: relative;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
        .hud-radar-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(0, 229, 255, 0.1) 80%, rgba(255, 255, 255, 0.8) 100%);
            animation: scanRadarHUD 2s linear infinite;
        }
        .shatter-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--tech-highlight);
            opacity: 0;
            pointer-events: none;
        }

        /* 元素逐帧淡入 */
        .figma-home-wrapper > div {
            opacity: 0;
            /* 动画由 JS 控制触发 */
        }

        /* 全局底层动效 */
        /* 1. 动态网格背景 */
        body.figma-home::before {
            content: '';
            position: absolute;
            inset: -100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.13) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.13) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
            z-index: 1;
            /* 网格斜向缓慢漂移 0.3px/s (对于大尺寸大约需要很长时间) */
            animation: gridDrift 40s linear infinite;
        }

        /* 2. CRT 扫描线 */
        .crt-scanline {
            position: absolute;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 168, 255, 0.08) 51%);
            background-size: 100% 4px;
        }
        
        .global-scanline {
            position: absolute;
            left: 0;
            top: -5px;
            width: 100%;
            height: 1px;
            background: rgba(0, 168, 255, 0.07);
            box-shadow: 0 0 10px rgba(0, 168, 255, 0.5);
            z-index: 998;
            pointer-events: none;
            animation: globalScan 12s linear infinite; /* 周期15s */
        }

        /* 电子干扰波纹 */
        body.figma-home::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 998;
            pointer-events: none;
            background: rgba(0, 229, 255, 0.02);
            opacity: 0;
            animation: glitchEffect 10s infinite;
        }

        /* 3. 菲涅尔边缘发光 */
        .fresnel-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 997;
            background: radial-gradient(circle at center, transparent 60%, rgba(0, 229, 255, 0.12) 100%);
        }

        /* 文本字符偏移阴影 */
        .tech-text-glow {
            text-shadow: 0 0 2px var(--tech-highlight), 0 0 5px rgba(0, 168, 255, 0.3) !important;
            font-family: 'Orbitron', 'Consolas', monospace; /* 替换字体 */
        }

        .figma-home-wrapper > div > div {
            z-index: 10;
        }
        
        /* 面板/边框极致细节 (军用战术面板) */
        .tech-panel-border {
            position: absolute;
            inset: 0;
            border-radius: 0px; 
            pointer-events: none;
            z-index: 0; 
            /* 背景：半透磨砂 + 电路纹理 */
            background: rgba(0, 25, 60, 0.85);
            backdrop-filter: blur(4px);
            /* 双层发光阴影 */
            box-shadow: 0 0 8px #00e5ff, 3px 3px 12px #000;
            overflow: hidden;
        }
        /* 横向拉丝纹理 + 微型电路板纹路 (用渐变模拟) */
        .tech-panel-border::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 168, 255, 0.06) 2px, rgba(0, 168, 255, 0.06) 3px),
                radial-gradient(circle at 10% 10%, rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 90% 90%, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            pointer-events: none;
            z-index: 1;
        }

        /* 分段式流光边框 (8段点亮) */
        .tech-panel-border-scan {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }
        .tech-panel-border-scan::before {
            content: '';
            position: absolute;
            inset: 0;
            /* 使用带透明度的虚线边框模拟8段，外加扫光蒙版 */
            border: 1px dashed rgba(0, 229, 255, 0.2);
            border-width: 2px;
            border-image: repeating-linear-gradient(45deg, var(--tech-highlight) 0, var(--tech-highlight) 10px, transparent 10px, transparent 20px) 1;
            -webkit-mask: conic-gradient(from var(--border-angle, 0deg), transparent 70%, white 100%);
            mask: conic-gradient(from var(--border-angle, 0deg), transparent 70%, white 100%);
            animation: borderScanConic 8s linear infinite;
        }

        @property --border-angle {
            syntax: '<angle>';
            inherits: true;
            initial-value: 0deg;
        }
        @keyframes borderScanConic {
            to { --border-angle: 360deg; }
        }

        /* 直角金属铆钉 (每角1个，中心白光，脉冲闪烁) */
        .tech-panel-rivet {
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid var(--tech-highlight);
            background: rgba(0, 25, 60, 0.85);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rivetPulseNew 2s infinite;
        }
        .tech-panel-rivet::after {
            content: '';
            width: 1px;
            height: 1px;
            background: #fff;
            box-shadow: 0 0 2px #fff;
        }
        .rivet-tl { top: 0; left: 0; }
        .rivet-tr { top: 0; right: 0; }
        .rivet-bl { bottom: 0; left: 0; }
        .rivet-br { bottom: 0; right: 0; }

        /* 中心全息 HUD 环特效重构 */
        .tech-core-panel {
            overflow: visible !important;
            position: relative;
            z-index: 15; 
        }
        .tech-hud-ring-1, .tech-hud-ring-2, .tech-hud-ring-3, .tech-hud-radar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
        }
        /* 96% 核心圆环雷达扫描线 */
        .tech-hud-radar-line {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 120px;
            height: 120px;
            transform-origin: 0 0;
            background: conic-gradient(from 0deg, rgba(255,255,255,0.8) 0deg, transparent 10deg);
            animation: scanRadarLine 10s linear infinite;
            z-index: 9;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 100% 0 0;
        }

        /* 侧边圆形仪表盘特效 (3层动效) */
        .tech-side-ring-base {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            border-radius: 50%;
            border: 4px solid rgba(0, 168, 255, 0.2); /* 底层：静态暗环 */
            pointer-events: none;
            z-index: 1;
        }
        .tech-side-ring-sweep {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--tech-highlight); /* 中层：动态扫光环 */
            animation: sweepRingNew 2s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
            z-index: 2;
        }
        /* 扫光时的粒子喷发用伪元素模拟 */
        .tech-side-ring-sweep::after {
            content: '';
            position: absolute;
            top: -4px; left: 50%;
            width: 4px; height: 4px;
            background: #fff;
            box-shadow: 0 0 5px var(--tech-highlight), 0 0 10px var(--tech-highlight);
            border-radius: 50%;
        }
        .tech-side-ring-top {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            border: 1px solid var(--tech-highlight); /* 顶层：高亮旋转环 */
            filter: blur(1px); /* 边缘高斯模糊 */
            animation: rotateOuterCentered 1.25s linear infinite; /* 0.8r/s */
            z-index: 3;
            border-left-color: transparent;
            border-right-color: transparent;
        }
        
        /* 数字跳动 + 呼吸发光 */
        .tech-number-jump {
            font-family: 'Orbitron', 'Consolas', monospace !important;
            animation: numberBreathe 2s ease-in-out infinite alternate;
        }

        /* 柱状图动效 */
        .tech-main-bar {
            position: relative;
            transform-origin: bottom;
            animation: barGrow 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            background: linear-gradient(to right, rgba(0, 229, 255, 0.53), rgba(0, 229, 255, 0.13)) !important; /* 纵向渐变高光 */
            transition: all 0.3s;
        }
        .tech-main-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ffffff; /* 柱顶高光点 */
            box-shadow: 0 0 2px #fff;
            transition: all 0.3s ease;
        }
        .tech-main-bar:hover {
            filter: brightness(1.5);
        }
        .tech-main-bar:hover::after {
            height: 5px;
            box-shadow: 0 0 10px var(--tech-highlight);
            border-radius: 50%;
            background: var(--tech-highlight);
            top: -2px;
        }

        /* 坐标轴网格线微动 */
        .tech-grid-line {
            position: absolute;
            width: 100%;
            height: 1px;
            border-top: 1px dashed rgba(0, 168, 255, 0.27);
            animation: gridLineFloat 5s ease-in-out infinite alternate;
        }
        .tech-grid-line::before, .tech-grid-line::after {
            content: '';
            position: absolute;
            top: -1px;
            width: 2px; height: 2px;
            background: var(--tech-highlight);
            border-radius: 50%;
            box-shadow: 0 0 4px var(--tech-highlight);
        }
        .tech-grid-line::before { left: 0; }
        .tech-grid-line::after { right: 0; }

        /* 折线图动效 */
        .tech-line-chart path {
            stroke: var(--tech-highlight);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2s ease-out forwards, lineGlow 2s 2s infinite alternate;
        }
        .tech-line-point {
            fill: var(--tech-bg-dark);
            stroke: var(--tech-highlight);
            stroke-width: 2;
            transform-origin: center;
            animation: pointPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        .tech-line-point-pulse {
            animation: pointPulseNew 1.5s infinite;
        }

        /* 卡片与按钮交互 */
        .interactive-element {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 10; 
            cursor: pointer;
        }
        .interactive-element:hover,
        .todo-runtime-card:hover,
        .figma-home-wrapper [data-layer^="btn__"]:hover,
        .figma-home-wrapper [data-layer="team-overview-btn"]:hover {
            transform: translateY(-2px);
            background-color: rgba(0, 229, 255, 0.13) !important;
            /* 边框流光加速在JS中控制或通过覆盖动画 */
        }
        .interactive-element:active,
        .todo-runtime-card:active {
            transform: scale(0.98);
        }

        /* 任务列表状态竖线 */
        .task-status-line {
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 3px;
            border-radius: 2px;
            animation: statusBreathe 3s infinite alternate;
        }
        .status-green { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .status-yellow { background: #ffff00; box-shadow: 0 0 5px #ffff00; }
        .status-red { background: #ff0000; box-shadow: 0 0 5px #ff0000; }

        /* 涟漪效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
            z-index: 9999;
        }

        /* 动画关键帧 */
        @keyframes gridDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -100px); }
        }
        @keyframes globalScan {
            0% { top: -5%; }
            100% { top: 105%; }
        }
        @keyframes glitchEffect {
            0%, 95%, 100% { opacity: 0; transform: translateX(0); }
            96% { opacity: 1; transform: translateX(-2px); filter: contrast(1.5); }
            97% { opacity: 1; transform: translateX(2px); filter: contrast(0.8); }
            98% { opacity: 1; transform: translateX(-1px); }
        }
        @keyframes rivetPulseNew {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.8; filter: brightness(0.8); }
        }
        @keyframes sweepRingNew {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes numberBreathe {
            0% { text-shadow: 0 0 2px var(--tech-highlight); }
            100% { text-shadow: 0 0 5px var(--tech-highlight); }
        }
        @keyframes gridLineFloat {
            0% { transform: translateY(-0.5px); }
            100% { transform: translateY(0.5px); }
        }
        @keyframes lineGlow {
            0% { filter: drop-shadow(0 0 2px var(--tech-highlight)); }
            100% { filter: drop-shadow(0 0 6px var(--tech-highlight)); }
        }
        @keyframes pointPulseNew {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); border-width: 2px; }
            100% { box-shadow: 0 0 0 3px rgba(0, 229, 255, 0); border-width: 4px; }
        }
        @keyframes statusBreathe {
            0% { filter: brightness(0.5); }
            100% { filter: brightness(1); }
        }
        @keyframes scanRadarLine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInLayout {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes rotateOuterCentered { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes scanRadarHUD { 100% { transform: rotate(360deg); } }
        @keyframes barGrow { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
    
        .figma-home-wrapper {
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            opacity: 0;
        }
        .figma-home-wrapper [data-layer*="月度受理"][data-layer*="概况"] {
            visibility: hidden;
        }

        .doctor-action-btn {
            position: relative;
            height: 34px;
            line-height: 34px;
            flex: 1;
            text-align: center;
            color: #DEFAFF;
            font-size: 15px;
            cursor: pointer;
            border-radius: 6px;
            background: rgba(15, 60, 115, 0.45);
            border: 1px solid rgba(110, 248, 255, 0.35);
            transition: all 0.2s;
            overflow: hidden;
        }
        .doctor-action-btn::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.8), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: borderFlow 3s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .doctor-action-btn:hover {
            background: rgba(30, 90, 160, 0.65);
            border-color: rgba(110, 248, 255, 0.85);
            box-shadow: 0 0 12px rgba(110, 248, 255, 0.3);
            transform: translateY(-1px);
        }
        .doctor-action-btn:hover::before {
            opacity: 1;
        }


        .tech-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        .tech-interactive {
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .tech-interactive:hover {
            transform: translateY(-2px);
            background-color: rgba(0, 229, 255, 0.1);
        }


        /* 军事折叠箭头动效 */
        [data-role="account-arrow"], [data-layer=" 下拉"], [data-layer=" 上一页"], [data-layer="下一页"] {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            filter: drop-shadow(0 0 2px rgba(0,229,255,0.5));
        }
        [data-role="account-arrow"]:hover, [data-layer=" 下拉"]:hover, [data-layer=" 上一页"]:hover, [data-layer="下一页"]:hover {
            transform: scale(1.1) rotate(5deg) !important;
            filter: drop-shadow(0 0 8px rgba(0,229,255,1));
            color: #00e5ff !important;
        }
        /* 渐进式描边可以加在SVG上 */
        svg path {
            transition: stroke-dashoffset 0.5s ease-in-out;
        }


        /* 医生信息头像动效 */
        .avatar-radar-base {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(0, 168, 255, 0.2); /* 底层静态暗环 #00a8ff33 左右 */
            box-shadow: inset 0 0 20px rgba(0, 168, 255, 0.1);
        }
        .avatar-radar-scan {
            position: absolute;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 229, 255, 0.8) 100%);
            animation: radarScan 2s linear infinite;
            -webkit-mask: radial-gradient(transparent 55%, #000 56%);
            mask: radial-gradient(transparent 55%, #000 56%);
        }
        .avatar-radar-top {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed #00e5ff;
            animation: radarRotate 1.66s linear infinite; /* 0.6r/s */
        }
        .avatar-text-breathe {
            animation: textBreatheScale 2s ease-in-out infinite alternate;
        }
        @keyframes textBreatheScale {
            0% { transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 3px #00e5ff; }
            100% { transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 15px #00e5ff, 0 0 5px #00e5ff; }
        }
        @keyframes radarRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes radarScan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }


        .info-row-icon {
            position: absolute;
            left: 0;
            top: 14px;
            width: 16px;
            height: 16px;
            fill: #00e5ff;
            filter: drop-shadow(0 0 5px #00e5ff);
            animation: iconPulse 2s infinite;
        }
        @keyframes iconPulse {
            0%, 100% { opacity: 1; transform: scale(1); }

        .info-row-text {
            font-family: 'Orbitron', Consolas, monospace !important;

        .data-source-scan {

            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e5ff, transparent);
            animation: sourceScan 3s linear infinite;
        }
        @keyframes sourceScan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }


        .radar-chart-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 229, 255, 0.4);
            animation: radarRotate 10s linear infinite;
            pointer-events: none;
        }
        .radar-chart-scan {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 80%, rgba(0, 229, 255, 0.5) 100%);
            -webkit-mask: radial-gradient(transparent 55%, #000 56%);
            mask: radial-gradient(transparent 55%, #000 56%);
            animation: radarScan 3s linear infinite;
            pointer-events: none;
        }
        .legend-item-hover {
            transition: all 0.2s;
            cursor: pointer;
        }
        .legend-item-hover:hover {
            color: #00e5ff !important;
            text-shadow: 0 0 8px #00e5ff;
            transform: scale(1.05);
        }


        /* 时间选择器流光边框 */
        .month-picker-glow {
            position: relative;
            border-radius: 4px;
            background: rgba(10, 30, 60, 0.6) !important;
            border: 1px solid rgba(0, 229, 255, 0.4) !important;
            transition: all 0.3s;
        }
        .month-picker-glow::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 5px;
            padding: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.8), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderFlow 2s linear infinite;
        }
        .month-picker-glow:hover {
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            background: rgba(20, 50, 90, 0.8) !important;
        }


        /* 柱状图动效 */
        .tech-bar-anim {
            transform-origin: bottom center;
            animation: barGrow 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            cursor: pointer;
            transition: filter 0.2s;
        }
        @keyframes barGrow {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        .tech-bar-anim:hover {
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.8));
        }
        .tech-bar-top-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            transition: all 0.2s;
        }
        .tech-bar-anim:hover .tech-bar-top-glow {
            width: 10px;
            height: 10px;
            box-shadow: 0 0 10px #00e5ff;
            background: #00e5ff;
        }
        /* 坐标轴动效 */
        .tech-axis-line {
            border-bottom: 1px dashed rgba(0, 229, 255, 0.3);
            position: absolute;
            width: 100%;
            animation: axisDrift 5s ease-in-out infinite alternate;
        }
        @keyframes axisDrift {
            0% { transform: translateY(-1px); }
            100% { transform: translateY(1px); }
        }
        /* 图例hover */
        .tech-info-hover:hover {
            background: rgba(0, 229, 255, 0.15) !important;
            transform: translateY(-2px);
        }


        .info-detail-item {
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: default;
        }
        .info-detail-item:hover {
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            transform: translateY(-1px);
        }

</style>

<body class="figma-home">
    <div id="hud-loader">
        <div class="hud-radar-loader"></div>
    </div>
    <div class="fresnel-glow"></div>
    <div class="crt-scanline"></div>
    <div class="global-scanline"></div>

    <div class="dlc-top-border"></div>
    <div class="dlc-top-nav">
        <a class="dlc-top-nav-btn" href="{{ url_for('main_interface') }}">首页</a>
        <a class="dlc-top-nav-btn" href="{{ ui_patient_url }}">病人中心</a>
        <a class="dlc-top-nav-btn" href="{{ url_for('team_management') }}">医生中心</a>
    </div>
    <div class="dlc-page-title">智慧医生管理平台</div>
    
    <div class="figma-home-wrapper">
        {% if figma_html %}
            {{ figma_html | safe }}
        {% else %}
            <div class="figma-missing">未找到页面内容</div>
        {% endif %}
    </div>
    <script id="doctors-data" type="application/json">{{ (doctors or []) | tojson }}</script>
    <script>
        const _currentRole = `{{ (current_user.role if current_user.is_authenticated else 'doctor') | e }}` || 'doctor';
        const isAdmin = _currentRole === 'admin';

        const applyFigmaScale = () => {
            const wrapper = document.querySelector('.figma-home-wrapper');
            if (!wrapper) return;
            const root = wrapper.querySelector('div[data-layer]') || wrapper.firstElementChild;
            if (!root) return;
            const w = parseFloat(root.style.width || '') || root.getBoundingClientRect().width || 1920;
            const h = parseFloat(root.style.height || '') || root.getBoundingClientRect().height || 1080;
            const vv = window.visualViewport;
            const vw = (vv && vv.width) ? vv.width : (wrapper.clientWidth || window.innerWidth || 0);
            const vh = (vv && vv.height) ? vv.height : (wrapper.clientHeight || window.innerHeight || 0);
            const vx = (vv && typeof vv.offsetLeft === 'number') ? vv.offsetLeft : 0;
            const vy = (vv && typeof vv.offsetTop === 'number') ? vv.offsetTop : 0;
            if (!vw || !vh || !w || !h) return;
            const scale = Math.min(vw / w, vh / h, 1);
            const scaledW = w * scale;
            const scaledH = h * scale;
            root.style.position = 'absolute';
            root.style.left = `0px`;
            root.style.top = `0px`;
            root.style.transformOrigin = 'top left';
            const tx = Math.max(0, (vw - scaledW) / 2);
            const baseTy = Math.max(0, (vh - scaledH) / 2);
            const maxDown = Math.max(0, vh - scaledH);
            const extraY = 100;
            const ty = Math.min(baseTy + extraY, maxDown);
            const zoomSupported = typeof CSS !== 'undefined' && CSS.supports && CSS.supports('zoom', '1');
            if (zoomSupported) {
                root.style.zoom = `${scale}`;
                root.style.transform = `translate(${vx + tx}px, ${vy + ty}px)`;
            } else {
                root.style.zoom = '';
                root.style.transform = `translate(${vx + tx}px, ${vy + ty}px) scale(${scale})`;
            }
        };

        window.addEventListener('resize', applyFigmaScale);

        // 数字跳动动画
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // 全局波纹点击动效
        function createRipple(event, element) {
            const circle = document.createElement('span');
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            const radius = diameter / 2;
            
            const rect = element.getBoundingClientRect();
            let x = event.clientX - rect.left - radius;
            let y = event.clientY - rect.top - radius;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            circle.classList.add('tech-ripple');
            
            const existingRipple = element.querySelector('.tech-ripple');
            if (existingRipple) {
                existingRipple.remove();
            }
            element.appendChild(circle);
            
            setTimeout(() => {
                circle.remove();
            }, 600);
        }

        // 为所有带有 tech-interactive 类的元素添加点击波纹
        document.addEventListener('click', (e) => {
            const target = e.target.closest('.tech-interactive, .slot-node, .doctor-action-btn, [data-layer=" 上一页"], [data-layer="下一页"]');
            if (target) {
                createRipple(e, target);
                // 点击缩放效果
                target.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    target.style.transform = '';
                }, 150);
            }
        });
        // 页面加载动效控制
        window.addEventListener('load', () => {
            applyFigmaScale();
            setTimeout(applyFigmaScale, 60);
            setTimeout(applyFigmaScale, 260);
            setTimeout(applyFigmaScale, 1200);
            setTimeout(() => {
                const loader = document.getElementById('hud-loader');
                if (loader) {
                    // 生成碎裂粒子
                    for (let i = 0; i < 20; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'shatter-particle';
                        particle.style.left = '50%';
                        particle.style.top = '50%';
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 100 + 50;
                        const tx = Math.cos(angle) * dist;
                        const ty = Math.sin(angle) * dist;
                        particle.animate([
                            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                            { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                        ], { duration: 500, easing: 'ease-out' });
                        loader.appendChild(particle);
                    }
                    const radar = loader.querySelector('.hud-radar-loader');
                    if (radar) radar.style.display = 'none';
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.remove();
                            // 开始元素逐帧淡入
                            const children = Array.from(document.querySelector('.figma-home-wrapper').children);
                            children.forEach((child, index) => {
                                child.style.opacity = '0';
                                child.style.animation = `fadeInLayout 0.5s ease forwards ${index * 0.05}s`;
                            });
                        }, 300);
                    }, 100);
                }
            }, 800); // 假装加载一段时间
        });

        // 全局波纹效果
        document.addEventListener('click', function (e) {
            const isClickable = e.target.closest('.interactive-element, .todo-runtime-card, [data-layer^="btn__"], [data-layer="list"], button');
            if (isClickable) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                const rect = isClickable.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
                isClickable.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });

        
        const doctorsDataEl = document.getElementById('doctors-data');
        let doctors = [];
        if (doctorsDataEl) {
            try {
                doctors = JSON.parse(doctorsDataEl.textContent);
            } catch (err) {
                doctors = [];
            }
        }
        let createDoctorButtonNode = null;
        let setCreateDoctorButtonLabel = () => {};
        let requestEnterCreateMode = () => {};
        let requestSaveCreateMode = () => {};
        const dashboardRoot = document.querySelector('.figma-home-wrapper > div[data-layer]');
        const wrapper = document.querySelector('.figma-home-wrapper');
        if (wrapper) {
            wrapper.style.width = '100%';
            wrapper.style.overflow = 'hidden';
        }
        const outerGridBackground = `
            linear-gradient(rgba(106, 198, 255, 0.11) 1px, transparent 1px),
            linear-gradient(90deg, rgba(106, 198, 255, 0.11) 1px, transparent 1px),
            linear-gradient(rgba(40, 110, 210, 0.15) 1px, transparent 1px),
            linear-gradient(90deg, rgba(40, 110, 210, 0.15) 1px, transparent 1px)
        `;
        document.body.style.backgroundColor = '#040E26';
        document.body.style.backgroundImage = outerGridBackground;
        document.body.style.backgroundSize = '44px 44px, 44px 44px, 11px 11px, 11px 11px';
        document.documentElement.style.backgroundColor = '#040E26';
        document.documentElement.style.backgroundImage = outerGridBackground;
        document.documentElement.style.backgroundSize = '44px 44px, 44px 44px, 11px 11px, 11px 11px';
        const legacyTopButtons = Array.from(document.querySelectorAll('div[data-layer="btn"]')).filter((btn) => {
            return Boolean(btn.querySelector('div[data-layer="首页"]') || btn.querySelector('div[data-layer="数字中心"]'));
        });
        legacyTopButtons.forEach((btn) => btn.remove());
        const topPanel = document.querySelector('div[data-layer="top"]');
        if (topPanel) {
            topPanel.style.display = 'none';
            topPanel.style.position = 'absolute';
            topPanel.style.top = '0';
            topPanel.style.left = '50%';
            topPanel.style.transform = 'translateX(-50%)';
            topPanel.style.zIndex = '10000';
            const currentUsername = `{{ (current_user.username if current_user.is_authenticated else 'admin') | e }}` || 'admin';
            const topBtns = Array.from(topPanel.querySelectorAll('div[data-layer="btn"]'));
            const applyBlueButtonTheme = (btn) => {
                if (!btn) {
                    return;
                }
                btn.style.filter = 'none';
                btn.style.borderRadius = '8px';
                btn.style.boxShadow = '0 0 12px rgba(98, 192, 255, 0.45), inset 0 0 10px rgba(36, 122, 215, 0.42)';
                btn.style.background = 'linear-gradient(180deg, rgba(20,120,220,0.60) 0%, rgba(8,48,110,0.80) 100%)';
                btn.querySelectorAll('linearGradient stop').forEach((stopNode, idx) => {
                    stopNode.setAttribute('stop-color', idx === 0 ? '#0D66D4' : '#4CC4FF');
                });
                btn.querySelectorAll('path[stroke]').forEach((pathNode) => {
                    pathNode.setAttribute('stroke', '#73D8FF');
                });
                btn.querySelectorAll('path[fill-rule], path[fill]').forEach((fillNode) => {
                    const current = (fillNode.getAttribute('fill') || '').toLowerCase();
                    if (current !== 'none') {
                        fillNode.setAttribute('fill', '#258CE0');
                    }
                });
                const labelNodes = btn.querySelectorAll('div[data-layer="首页"], div[data-layer="数字中心"]');
                labelNodes.forEach((labelNode) => {
                    labelNode.style.color = '#EAF7FF';
                    labelNode.style.textShadow = '0 0 8px rgba(128, 220, 255, 0.62)';
                });
            };
            topBtns.forEach((btn) => applyBlueButtonTheme(btn));
            if (topBtns[0]) {
                topBtns[0].addEventListener('click', () => {
                    window.location.href = '{{ url_for("main_interface") }}';
                });
            }
            const createBtn = topBtns[1];
            if (createBtn) {
                createDoctorButtonNode = createBtn;
                const createBtnTextNode = Array.from(createBtn.querySelectorAll('div'))
                    .find((node) => node.children.length === 0 && node.textContent.trim().length > 0);
                setCreateDoctorButtonLabel = (text) => {
                    if (createBtnTextNode) {
                        createBtnTextNode.textContent = text;
                    }
                };
                setCreateDoctorButtonLabel('新增');
                createBtn.style.cursor = 'pointer';
                if (!isAdmin) {
                    createBtn.style.display = 'none';
                }
                createBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const btnText = createBtnTextNode ? createBtnTextNode.textContent.trim() : '';
                    if (btnText === '确定') {
                        requestSaveCreateMode();
                        return;
                    }
                    requestEnterCreateMode();
                });
            }
            const platformTitleNode = topPanel.querySelector('div[data-layer="智慧楼宇管理平台"]')
                || Array.from(topPanel.querySelectorAll('div'))
                    .find((node) => {
                        const text = node.textContent.trim();
                        return node.children.length === 0 && (text.includes('管理平台') || text === '医生管理系统');
                    });
            if (platformTitleNode) {
                platformTitleNode.textContent = '医生信息管理平台';
            }
            const accountNode = topPanel.querySelector('div[data-layer="账号"]');
            if (accountNode) {
                accountNode.style.cursor = 'pointer';
                accountNode.style.position = accountNode.style.position || 'absolute';
                const allStops = accountNode.querySelectorAll('stop');
                if (allStops.length > 0) {
                    const colors = ['#0D66D4', '#3C9CFF', '#62D0FF'];
                    allStops.forEach((stopNode, idx) => {
                        stopNode.setAttribute('stop-color', colors[Math.min(idx, colors.length - 1)]);
                    });
                }
                accountNode.querySelectorAll('path[stroke], circle[stroke]').forEach((node) => {
                    node.setAttribute('stroke', '#72D9FF');
                });
                const usernameNode = accountNode.querySelector('div[data-layer="张小花"]')
                    || Array.from(accountNode.querySelectorAll('div'))
                        .find((node) => node.children.length === 0 && node.textContent.trim().length > 0);
                if (usernameNode) {
                    usernameNode.textContent = currentUsername;
                    usernameNode.style.color = '#EAF7FF';
                }
                accountNode.querySelectorAll('[data-role="account-arrow"]').forEach((node) => node.remove());
                if (usernameNode) {
                    const accountRect = accountNode.getBoundingClientRect();
                    const nameRect = usernameNode.getBoundingClientRect();
                    Array.from(accountNode.querySelectorAll('*')).forEach((node) => {
                        if (!(node instanceof HTMLElement) || node === usernameNode || usernameNode.contains(node)) {
                            return;
                        }
                        if (node.getAttribute('data-role') === 'account-arrow') {
                            return;
                        }
                        const rect = node.getBoundingClientRect();
                        const inNameRightZone = rect.left >= nameRect.right - 10 && rect.right <= accountRect.right + 30;
                        const isSmallArrowLike = rect.width > 0 && rect.height > 0 && rect.width <= 42 && rect.height <= 32;
                        const text = (node.textContent || '').trim();
                        const isArrowTextLike = text === '▼' || text === '▾' || text === '⌄' || text === '˅';
                        if (inNameRightZone && (isSmallArrowLike || isArrowTextLike)) {
                            node.style.display = 'none';
                            node.style.pointerEvents = 'none';
                        }
                    });
                }
                let arrowNode = accountNode.querySelector('[data-role="account-arrow"]');
                if (!arrowNode) {
                    arrowNode = document.createElement('div');
                    arrowNode.setAttribute('data-role', 'account-arrow');
                    arrowNode.style.position = 'absolute';
                    arrowNode.style.right = '0px';
                    arrowNode.style.top = '50%';
                    arrowNode.style.width = '0';
                    arrowNode.style.height = '0';
                    arrowNode.style.borderLeft = '6px solid transparent';
                    arrowNode.style.borderRight = '6px solid transparent';
                    arrowNode.style.borderTop = '8px solid #EAF7FF';
                    arrowNode.style.transform = 'translateY(-35%)';
                    arrowNode.style.transition = 'transform 0.2s ease';
                    accountNode.appendChild(arrowNode);
                }
                let dropdownNode = document.querySelector('[data-role="account-dropdown"]');
                if (dropdownNode) {
                    dropdownNode.remove();
                }
                dropdownNode = document.createElement('div');
                dropdownNode.setAttribute('data-role', 'account-dropdown');
                dropdownNode.style.position = 'fixed';
                dropdownNode.style.minWidth = '120px';
                dropdownNode.style.padding = '8px';
                dropdownNode.style.border = '1px solid rgba(90, 185, 255, 0.55)';
                dropdownNode.style.borderRadius = '8px';
                dropdownNode.style.background = 'linear-gradient(180deg, rgba(9,42,95,0.96) 0%, rgba(6,24,60,0.96) 100%)';
                dropdownNode.style.boxShadow = '0 6px 14px rgba(0,0,0,0.35), 0 0 10px rgba(76,172,255,0.35)';
                dropdownNode.style.display = 'none';
                dropdownNode.style.zIndex = '9999';
                const logoutItem = document.createElement('div');
                logoutItem.textContent = '退出登录';
                logoutItem.style.color = '#EAF7FF';
                logoutItem.style.fontSize = '14px';
                logoutItem.style.padding = '8px 10px';
                logoutItem.style.borderRadius = '6px';
                logoutItem.style.cursor = 'pointer';
                logoutItem.addEventListener('mouseenter', () => {
                    logoutItem.style.background = 'rgba(66, 168, 255, 0.22)';
                });
                logoutItem.addEventListener('mouseleave', () => {
                    logoutItem.style.background = 'transparent';
                });
                logoutItem.addEventListener('click', () => {
                    window.location.href = '{{ url_for("logout") }}';
                });
                dropdownNode.appendChild(logoutItem);
                document.body.appendChild(dropdownNode);
                let menuOpen = false;
                const closeMenu = () => {
                    menuOpen = false;
                    dropdownNode.style.display = 'none';
                    arrowNode.style.transform = 'translateY(-35%)';
                };
                const openMenu = () => {
                    const rect = accountNode.getBoundingClientRect();
                    dropdownNode.style.left = `${Math.max(12, rect.right - 120)}px`;
                    dropdownNode.style.top = `${rect.bottom + 8}px`;
                    dropdownNode.style.display = 'block';
                    menuOpen = true;
                    arrowNode.style.transform = 'translateY(-35%) rotate(180deg)';
                };
                accountNode.addEventListener('click', (event) => {
                    event.stopPropagation();
                    if (menuOpen) {
                        closeMenu();
                    } else {
                        openMenu();
                    }
                });
                dropdownNode.addEventListener('click', (event) => event.stopPropagation());
                document.addEventListener('click', () => {
                    if (menuOpen) {
                        closeMenu();
                    }
                });
                window.addEventListener('resize', () => {
                    if (menuOpen) {
                        openMenu();
                    }
                });
            }
        }
        const sceneNode = document.querySelector('div[data-layer="标题场景"]')
            || Array.from(document.querySelectorAll('div'))
                .find((node) => node.children.length === 0 && node.textContent.trim() === '标题场景');
        if (sceneNode) {
            sceneNode.textContent = '医生列表';
        }
        const bgBitmap = document.querySelector('img[data-layer="位图"]');
        if (bgBitmap) {
            bgBitmap.style.display = '';
        }
        
        const parsePx = (value) => parseFloat(`${value || '0'}`.replace('px', '')) || 0;
        const leftNav = document.querySelector('div[data-layer="左侧导航"]');
        if (leftNav) {
            const targetLayers = new Set(['椭圆形', '椭圆形备份', '顺时针旋转', '形状']);
            Array.from(leftNav.children).forEach((node) => {
                const layer = node.getAttribute('data-layer') || '';
                const left = parsePx(node.style.left);
                const top = parsePx(node.style.top);
                if (targetLayers.has(layer) && left >= 30 && left <= 190 && top >= 10 && top <= 140) {
                    node.style.display = 'none';
                }
            });
            const oldCircle = leftNav.querySelector('[data-role="left-nav-circle"]');
            if (oldCircle) {
                oldCircle.remove();
            }
            const circleBlock = document.createElement('div');
            circleBlock.setAttribute('data-role', 'left-nav-circle');
            circleBlock.style.position = 'absolute';
            circleBlock.style.left = '0';
            circleBlock.style.top = '0';
            circleBlock.style.width = '376px';
            circleBlock.style.height = '170px';
            circleBlock.style.pointerEvents = 'none';
            circleBlock.style.zIndex = '6';

    <script>

        // 数字跳动动画
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // 全局波纹点击动效
        function createRipple(event, element) {
            const circle = document.createElement('span');
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            const radius = diameter / 2;
            
            const rect = element.getBoundingClientRect();
            let x = event.clientX - rect.left - radius;
            let y = event.clientY - rect.top - radius;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            circle.classList.add('tech-ripple');
            
            const existingRipple = element.querySelector('.tech-ripple');
            if (existingRipple) {
                existingRipple.remove();
            }
            element.appendChild(circle);
            
            setTimeout(() => {
                circle.remove();
            }, 600);
        }

        // 为所有带有 tech-interactive 类的元素添加点击波纹
        document.addEventListener('click', (e) => {

                // 点击缩放效果
                target.style.transform = 'scale(0.98)';

                    target.style.transform = '';

            }

                    const hasTitle = textNodes.some((n) => ['月度受理病例情况', '月度受理工单概况', '月度受理病例概况'].includes(n.textContent.trim()));

                const globalDoctorName = `${window.__teamSelectedDoctorName || ''}`.trim();
                if (globalDoctorId || globalDoctorName) {
                    return { id: globalDoctorId || '0', name: globalDoctorName || `doctor_${globalDoctorId || '0'}`, key: `${globalDoctorId || '0'}|${globalDoctorName || ''}`, draft: isDraft, hasData };
                }
                return { id: '0', name: 'doctor', key: '0|doctor', draft: isDraft, hasData };
            };
            const buildStats = (seedBase, isDraft = false, hasData = true) => {
                const categories = [
                    { name: '脑膜瘤', color: '#33D695' },
                    { name: '胶质瘤', color: '#05A09A' },
                    { name: '垂体瘤', color: '#0077FF' },
                    { name: '听神经瘤', color: '#4346D3' }
                ];
                if (isDraft || !hasData) {
                    const values = Array.from({ length: 30 }, () => [0, 0, 0, 0]);
                    const totals = Array.from({ length: 30 }, () => 0);
                    return {
                        categories: categories.map((item) => ({ ...item, count: 0 })),
                        values,
                        totals,
                        total: 0,
                        avgPerDay: 0
                    };
                }
                const profile = getCurrentDoctorProfile();
                const doctorId = Number.parseInt(`${profile.id || '0'}`, 10) || 0;
                const monthIndexRaw = Number.parseInt(`${window.__teamSelectedMonthIndex ?? 0}`, 10);
                const monthIndex = Number.isNaN(monthIndexRaw) ? 0 : Math.max(0, Math.min(4, monthIndexRaw));
                const hash = seedBase + doctorId * 53 + monthIndex * 97;
                const categoryCounts = [
                    58 + ((hash + 19) % 72),
                    46 + ((Math.floor(hash / 5) + monthIndex * 3) % 66),
                    38 + ((Math.floor(hash / 9) + monthIndex * 5) % 61),
                    24 + ((Math.floor(hash / 13) + monthIndex * 7) % 52)
                ];
                const total = categoryCounts.reduce((sum, value) => sum + value, 0);
                const avgPerDay = Math.round(total / 30);
                let rng = ((hash * 1103515245 + 12345) % 2147483647) + 1;
                const random01 = () => {
                    rng = (rng * 48271) % 2147483647;
                    return rng / 2147483647;
                };
                const buildCategoryDailySeries = (categoryTotal) => {
                    const weights = Array.from({ length: 30 }, (_, day) => {
                        const wave = 1 + 0.45 * Math.sin((day + monthIndex + 1) / 3.8) + 0.25 * Math.cos((day + doctorId + 2) / 5.3);
                        const jitter = 0.55 + random01() * 0.9;
                        return Math.max(0.08, wave * jitter);
                    });
                    const weightSum = weights.reduce((sum, value) => sum + value, 0);
                    const base = weights.map((weight) => Math.floor((categoryTotal * weight) / weightSum));
                    let remain = categoryTotal - base.reduce((sum, value) => sum + value, 0);
                    while (remain > 0) {
                        const index = Math.floor(random01() * 30);
                        base[index] += 1;
                        remain -= 1;
                    }
                    return base;
                };
                const perCategoryDaily = categoryCounts.map((count) => buildCategoryDailySeries(count));
                const values = Array.from({ length: 30 }, (_, day) => ([
                    perCategoryDaily[0][day],
                    perCategoryDaily[1][day],
                    perCategoryDaily[2][day],
                    perCategoryDaily[3][day]
                ]));
                const totals = values.map((row) => row.reduce((sum, value) => sum + value, 0));
                return {
                    categories: categories.map((item, index) => ({ ...item, count: categoryCounts[index] })),
                    values,
                    totals,
                    total,
                    avgPerDay
                };
            };
            const renderBlock = () => {
                const section = getSection();
                if (!section) {
                    return;
                }
                section.style.visibility = 'hidden';
                section.style.opacity = '0';
                const profile = getCurrentDoctorProfile();
                const seed = hashText(profile.key);
                const stats = buildStats(seed, profile.draft, profile.hasData);
                section.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.style.position = 'absolute';
                wrap.style.left = '0';
                wrap.style.top = '0';
                wrap.style.width = '1471px';
                wrap.style.height = '295px';
                wrap.style.background = 'linear-gradient(180deg, rgba(6, 18, 44, 0.85), rgba(4, 12, 30, 0.88))';
                wrap.style.border = '1px solid rgba(72, 170, 255, 0.18)';
                wrap.style.boxShadow = '0 0 10px rgba(10, 70, 150, 0.25)';
                wrap.style.borderRadius = '10px';
                section.appendChild(wrap);

                const title = document.createElement('div');
                title.textContent = '月度受理病例情况';
                title.style.position = 'absolute';
                title.style.left = '22px';
                title.style.top = '16px';
                title.style.color = '#D3E9FF';
                title.style.fontSize = '16px';
                title.style.letterSpacing = '0.6px';
                wrap.appendChild(title);

                const cards = [
                    { label: '月度受理总量', value: stats.total },
                    { label: '脑膜瘤受理', value: stats.categories[0].count },
                    { label: '日均受理', value: stats.avgPerDay },
                    { label: '胶质瘤受理', value: stats.categories[1].count }
                ];
                cards.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.style.position = 'absolute';
                    card.style.left = `${28 + (idx % 2) * 122}px`;
                    card.style.top = `${54 + Math.floor(idx / 2) * 112}px`;
                    card.style.width = '108px';
                    card.style.height = '96px';
                    card.style.border = '1px solid rgba(72, 190, 255, 0.28)';
                    card.style.borderRadius = '6px';
                    card.style.background = 'linear-gradient(180deg, rgba(7, 30, 72, 0.55), rgba(3, 14, 38, 0.55))';
                    const value = document.createElement('div');
                    value.textContent = `${item.value}`;
                    value.style.position = 'absolute';
                    value.style.left = '50%';
                    value.style.top = '18px';
                    value.style.transform = 'translateX(-50%)';
                    value.style.color = '#62F0FF';
                    value.style.fontSize = `${`${item.value}`.length >= 5 ? 32 : 38}px`;
                    value.style.lineHeight = '38px';
                    value.style.fontFamily = 'Abel, Source Han Sans CN, Microsoft YaHei, sans-serif';
                    value.style.textShadow = '0 0 8px rgba(48, 214, 255, 0.35)';
                    const label = document.createElement('div');
                    label.textContent = item.label;
                    label.style.position = 'absolute';
                    label.style.left = '50%';
                    label.style.top = '64px';
                    label.style.transform = 'translateX(-50%) scale(0.52)';
                    label.style.transformOrigin = 'center top';
                    label.style.color = 'rgba(210, 235, 255, 0.92)';
                    label.style.fontSize = '20px';
                    label.style.whiteSpace = 'nowrap';
                    card.appendChild(value);
                    card.appendChild(label);
                    wrap.appendChild(card);
                });

                const legend = document.createElement('div');
                legend.style.position = 'absolute';
                legend.style.right = '34px';
                legend.style.top = '16px';
                legend.style.display = 'flex';
                legend.style.gap = '14px';
                stats.categories.forEach((cat) => {
                    const item = document.createElement('div');
                    item.style.display = 'flex';
                    item.style.alignItems = 'center';
                    item.style.gap = '6px';
                    const dot = document.createElement('span');
                    dot.style.width = '6px';
                    dot.style.height = '6px';
                    dot.style.borderRadius = '50%';
                    dot.style.background = cat.color;
                    dot.style.boxShadow = '0 0 6px rgba(100, 210, 255, 0.35)';
                    const text = document.createElement('span');
                    text.textContent = cat.name;
                    text.style.color = 'rgba(210, 235, 255, 0.9)';
                    text.style.fontSize = '11px';
                    item.appendChild(dot);
                    item.appendChild(text);
                    legend.appendChild(item);
                });
                wrap.appendChild(legend);

                const chartArea = document.createElement('div');
                chartArea.style.position = 'absolute';
                chartArea.style.left = '272px';
                chartArea.style.top = '52px';
                chartArea.style.width = '1148px';
                chartArea.style.height = '200px';
                chartArea.style.borderBottom = '1px solid rgba(120, 200, 255, 0.25)';
                wrap.appendChild(chartArea);

                const maxTotal = Math.max(...stats.totals, 1);
                const barWidth = 12;
                const gap = 18;
                stats.values.forEach((row, index) => {
                    const total = row.reduce((s, n) => s + n, 0);
                    const height = Math.max(34, Math.round(30 + (total / maxTotal) * 138));
                    const bar = document.createElement('div');
                    bar.style.position = 'absolute';
                    bar.style.left = `${index * (barWidth + gap)}px`;
                    bar.style.bottom = '14px';
                    bar.style.width = `${barWidth}px`;
                    bar.style.height = `${height}px`;
                    const h1 = Math.max(2, Math.round(height * (row[0] / total)));
                    const h2 = Math.max(2, Math.round(height * (row[1] / total)));
                    const h3 = Math.max(2, Math.round(height * (row[2] / total)));
                    const h4 = Math.max(2, height - h1 - h2 - h3);
                    const seg = (heightSeg, bottom, color, radiusTop) => {
                        const d = document.createElement('div');
                        d.style.position = 'absolute';
                        d.style.left = '0';
                        d.style.bottom = `${bottom}px`;
                        d.style.width = '100%';
                        d.style.height = `${heightSeg}px`;
                        d.style.background = color;
                        if (radiusTop) {
                            d.style.borderRadius = '4px 4px 0 0';
                        }
                        bar.appendChild(d);
                    };
                    seg(h1, 0, stats.categories[0].color, false);
                    seg(h2, h1, stats.categories[1].color, false);
                    seg(h3, h1 + h2, stats.categories[2].color, false);
                    seg(h4, h1 + h2 + h3, stats.categories[3].color, true);
                    chartArea.appendChild(bar);

                    const dayLabel = document.createElement('div');
                    dayLabel.textContent = `${index + 1}`;
                    dayLabel.style.position = 'absolute';
                    dayLabel.style.left = `${index * (barWidth + gap)}px`;
                    dayLabel.style.bottom = '-6px';
                    dayLabel.style.width = `${barWidth}px`;
                    dayLabel.style.textAlign = 'center';
                    dayLabel.style.color = 'rgba(200, 230, 255, 0.85)';
                    dayLabel.style.fontSize = '10px';
                    dayLabel.style.transform = 'scale(0.78)';
                    dayLabel.style.transformOrigin = 'center top';
                    chartArea.appendChild(dayLabel);
                });

                const info = document.createElement('div');
                info.style.position = 'absolute';
                info.style.right = '26px';
                info.style.top = '66px';
                info.style.width = '136px';
                info.style.padding = '10px';
                info.style.borderRadius = '6px';
                info.style.background = 'rgba(10, 18, 34, 0.78)';
                info.style.color = '#D9EEFF';
                info.style.fontSize = '11px';
                info.style.lineHeight = '17px';
                info.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.35)';
                const dayIndex = 14;
                const row = stats.values[dayIndex] || [0, 0, 0, 0];
                info.innerHTML = `2020.05.${String(dayIndex + 1).padStart(2, '0')}<br/>当日受理 ${stats.totals[dayIndex]}次<br/>脑膜瘤 ${row[0]}次<br/>胶质瘤 ${row[1]}次<br/>垂体瘤 ${row[2]}次<br/>听神经瘤 ${row[3]}次`;
                wrap.appendChild(info);
                section.style.visibility = 'visible';
                section.style.opacity = '1';
                const wrapper = document.querySelector('.figma-home-wrapper');
                if (wrapper) {
                    wrapper.style.opacity = '1';
                }
            };
            const render = () => renderBlock();
            window.__teamRefreshBottomBlock = render;
            setTimeout(render, 80);
            setInterval(render, 800);
            document.addEventListener('click', () => setTimeout(render, 60));
            window.addEventListener('resize', () => setTimeout(render, 80));
        })();
    
        // 动态添加军用战术面板边框和底纹
        const targetBgs = Array.from(document.querySelectorAll('[data-layer="bg"]')).filter(node => {
            const width = parseFloat(node.style.width || '0');
            return width > 150; 
        });
        targetBgs.forEach(bg => {
            if (!bg.querySelector('.tech-panel-border') && bg.closest('.figma-home-wrapper')) {
                // 确保原有子元素(如任务列表模块)显示在底层面板之上，避免被遮挡朦胧
                Array.from(bg.children).forEach(child => {
                    if (window.getComputedStyle(child).position === 'static') {
                        child.style.position = 'relative';
                    }
                    child.style.zIndex = '10';
                });

                // 面板底色及纹理
                const border = document.createElement('div');
                border.className = 'tech-panel-border';
                
                // 分段式流光
                const scan = document.createElement('div');
                scan.className = 'tech-panel-border-scan';
                
                // 四角铆钉
                ['tl', 'tr', 'bl', 'br'].forEach(pos => {
                    const rivet = document.createElement('div');
                    rivet.className = `tech-panel-rivet rivet-${pos}`;
                    bg.appendChild(rivet);
                });

                bg.appendChild(border);
                bg.appendChild(scan);
                bg.style.boxShadow = 'none'; // 清除原背景阴影以使用新的双层阴影
            }
        });

</script>
</body>
</html>
